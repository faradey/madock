name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          targets="darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64"
          for t in $targets; do
            os="${t%/*}"
            arch="${t#*/}"
            out="madock-${os}-${arch}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            echo "Building $out$ext"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w" -o "dist/${out}${ext}"
          done

      - name: Generate changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current="${GITHUB_REF_NAME}"
          # Base the changelog on the previous PUBLISHED release (not every tag gets one).
          prev=$(gh release list --limit 100 --exclude-drafts --json tagName \
                   --jq "[.[] | .tagName] | map(select(. != \"$current\")) | .[0] // \"\"" 2>/dev/null || echo "")
          # Fallbacks: previous tag, then full history.
          if [ -z "$prev" ]; then
            prev=$(git describe --tags --abbrev=0 "${current}^" 2>/dev/null || echo "")
          fi
          {
            echo "## What's Changed"
            echo ""
            if [ -n "$prev" ]; then
              git log --no-merges --pretty='- %s' "${prev}..${current}"
            else
              git log --no-merges --pretty='- %s' "${current}"
            fi
            echo ""
            if [ -n "$prev" ]; then
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${current}"
            fi
          } > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/*
