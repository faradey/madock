server {
    listen      {{{nginx/port/internal}}};
    server_name {{{nginx/host_names}}};

    set $SITE_ROOT {{{workdir}}};

    index index.html;
    autoindex off;
    charset UTF-8;

    client_max_body_size       2G;

    # Docker's embedded DNS server. Resolving upstreams through a
    # variable defers DNS lookup to request time — nginx no longer
    # fails to start when the storefront container hasn't booted yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $backend_upstream    "http://ruby:3000";
    set $storefront_upstream "http://storefront:3001";

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Spree Rails backend — admin UI, REST/GraphQL APIs, Active Storage
    # blobs, health probe, asset pipeline (Propshaft) and Rails-served
    # static files. Anything Spree-owned lives here.
    location ^~ /admin       { proxy_pass $backend_upstream; }
    location ^~ /admin_user  { proxy_pass $backend_upstream; }
    location ^~ /api         { proxy_pass $backend_upstream; }
    location ^~ /up          { proxy_pass $backend_upstream; }
    location ^~ /rails       { proxy_pass $backend_upstream; }
    location ^~ /assets      { proxy_pass $backend_upstream; }
    location ^~ /webhooks    { proxy_pass $backend_upstream; }
    location ^~ /oauth       { proxy_pass $backend_upstream; }
    location ^~ /cable       { proxy_pass $backend_upstream; }

    # Everything else — Next.js storefront on :3001.
    location / {
        proxy_pass $storefront_upstream;
    }

    gzip on;
    gzip_disable "msie6";
    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_vary on;

    location ~* (\.htaccess$|\.git) {
        deny all;
    }
}
