server {
    listen      {{{nginx/port/internal}}};
    server_name {{{nginx/host_names}}};

    set $SITE_ROOT {{{workdir}}};

    index index.html;
    autoindex off;
    charset UTF-8;

    client_max_body_size       2G;

    # Docker's embedded DNS server. Resolving upstreams through a
    # variable defers DNS lookup to request time — nginx no longer
    # fails to start when the storefront container hasn't booted
    # yet, and DNS is re-checked after the resolver TTL so restarts
    # propagate too.
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $backend_upstream    "http://nodejs:9000";
    set $storefront_upstream "http://storefront:8000";

    # Shared proxy params for every backend/storefront location.
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;

    # Medusa backend routes — Admin UI (Vite) at /app, REST APIs at
    # /store, /admin, /auth, plus /health for readiness checks.
    location ^~ /health { proxy_pass $backend_upstream; }
    location ^~ /app    { proxy_pass $backend_upstream; }
    location ^~ /store  { proxy_pass $backend_upstream; }
    location ^~ /admin  { proxy_pass $backend_upstream; }
    location ^~ /auth   { proxy_pass $backend_upstream; }

    # Everything else — Next.js storefront on :8000.
    location / {
        proxy_pass $storefront_upstream;
    }

    gzip on;
    gzip_disable "msie6";

    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/js
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
    gzip_vary on;

    location ~* (\.htaccess$|\.git) {
        deny all;
    }
}
