<<<if{{{sylius/messenger/enabled}}}>>>
  messenger:
    init: true
    build:
      context: ctx
      dockerfile: php.Dockerfile
    tty: true
    working_dir: {{{workdir}}}
    volumes:
      - ./src:/var/www/html:cached
    environment:
      APP_ENV: "dev"
    command:
      - bash
      - -lc
      - |
        cd {{{workdir}}}
        while [ ! -f bin/console ]; do
          echo '[madock] messenger: waiting for project'
          sleep 5
        done
        while [ ! -f vendor/autoload.php ]; do
          echo '[madock] messenger: waiting for composer install'
          sleep 5
        done
        set -a
        [ -f .env.local ] && . ./.env.local
        set +a
        # Sylius 2 ships `main`, `payment_request`,
        # `catalog_promotion_removal` transports via vendor bundles
        # (not visible in the project's messenger.yaml). Consume the
        # well-known set. Override via SYLIUS_MESSENGER_TRANSPORTS env.
        # NB: `$$` escapes docker-compose interpolation so bash sees `$`.
        TRANSPORTS="$${SYLIUS_MESSENGER_TRANSPORTS:-main payment_request catalog_promotion_removal}"
        echo "[madock] messenger: consuming transports: $$TRANSPORTS"
        exec php bin/console messenger:consume $$TRANSPORTS --memory-limit=256M --time-limit=3600 -vv
    extra_hosts:
      - "host.docker.internal:host-gateway"
      {{{nginx/host_gateways}}}
    restart: {{{restart_policy}}}
<<<endif>>>
    <<<if{{{sylius/messenger/enabled}}}{{{isolation/enabled}}}>>>networks:
      - isolated<<<endif>>>
