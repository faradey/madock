<<<if{{{sylius/encore/enabled}}}>>>
  encore:
    init: true
    build:
      context: ctx
      dockerfile: php.Dockerfile
    tty: true
    working_dir: {{{workdir}}}
    volumes:
      - ./src:/var/www/html:cached
    environment:
      NODE_ENV: "development"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command:
      - bash
      - -lc
      - |
        cd {{{workdir}}}
        while [ ! -f package.json ]; do
          echo '[madock] encore: waiting for project'
          sleep 5
        done
        while [ ! -d node_modules ]; do
          echo '[madock] encore: waiting for yarn install'
          sleep 5
        done
        exec yarn watch
    extra_hosts:
      - "host.docker.internal:host-gateway"
      {{{nginx/host_gateways}}}
    restart: {{{restart_policy}}}
<<<endif>>>
    <<<if{{{sylius/encore/enabled}}}{{{isolation/enabled}}}>>>networks:
      - isolated<<<endif>>>
