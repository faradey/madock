<<<if{{{db/type_is_mysql}}}>>>
  db:
    init: true
<<<if{{{db/use_default_auth_plugin}}}>>>    command:
      --default-authentication-plugin=mysql_native_password
<<<endif>>>    build:
      context: ctx
      dockerfile: db.Dockerfile
    ports:
      - "{{{port/db}}}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "{{{db/root_password}}}"
      MYSQL_DATABASE: "{{{db/database}}}"
      MYSQL_USER: "{{{db/user}}}"
      MYSQL_PASSWORD: "{{{db/password}}}"
    volumes:
      - dbdata:/var/lib/mysql
      - ./ctx/my.cnf:/etc/mysql/conf.d/mysql.cnf:delegated
    <<<if{{{isolation/enabled}}}>>>networks:
      - isolated<<<endif>>>
    restart: {{{restart_policy}}}
<<<endif>>>