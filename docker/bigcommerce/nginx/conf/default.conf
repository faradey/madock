<<<if{{{php/enabled}}}>>>
fastcgi_buffer_size 64k;
fastcgi_buffers 1024 64k;

upstream fastcgi_backend {
    server  php:9000;
}

server {
    listen      {{{nginx/port/internal}}};
    server_name {{{nginx/host_names}}};

    root {{{workdir}}}/{{{public_dir}}};

    index index.php;
    autoindex off;
    charset UTF-8;

    client_max_body_size       2G;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ [^/]\.php(/|$) {
        include /etc/nginx/fastcgi_params;

        try_files $uri $uri/ /index.php?$uri;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

        fastcgi_pass   fastcgi_backend;
        fastcgi_index  index.php;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_buffers 16 8k;
    gzip_proxied any;
    gzip_types text/plain text/css text/js text/xml text/javascript
               application/javascript application/x-javascript
               application/json application/xml image/svg+xml;
    gzip_vary on;
}
<<<else>>>
<<<if{{{nodejs/enabled}}}>>>
# Node-only BigCommerce preset (catalyst / stencil / app-node).
# Proxy everything to nodejs:3000. Conditional Connection header
# avoids Catalyst / Next.js dev server choking on "Connection:
# upgrade" for non-WS requests.
map $http_upgrade $node_connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen      {{{nginx/port/internal}}};
    server_name {{{nginx/host_names}}};

    set $SITE_ROOT {{{workdir}}};

    client_max_body_size       2G;

    location / {
        proxy_pass http://nodejs:{{{main_service_port}}};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $node_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
<<<endif>>>
<<<endif>>>
