fastcgi_buffer_size 64k;
fastcgi_buffers 1024 64k;

upstream fastcgi_backend_xdebug_false {
    server  php:9000;
}
<<<if{{{php/enabled}}}{{{php/xdebug/enabled}}}>>>
upstream fastcgi_backend_xdebug_true {
    server  php_without_xdebug:9000;
}
<<<endif>>>

server {
    listen      {{{nginx/port/internal}}};
    server_name {{{nginx/host_names}}};

    index index.php;
    client_max_body_size       2G;

    root {{{workdir}}}/{{{public_dir}}};

    location = /sitemap.xml {
        log_not_found off;
        access_log off;
        try_files $uri /;
    }

    location = /robots.txt {
        log_not_found off;
        access_log off;
        try_files $uri /;
    }

    # Long-cache hashed assets emitted by Webpack Encore (`build/`).
    location ^~ /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ^~ /media/ {
        try_files $uri =404;
    }

    location ^~ /bundles/ {
        try_files $uri =404;
    }

    location ~* ^.+\.(?:css|cur|js|jpe?g|gif|ico|png|svg|webp|htm|woff|woff2|xml)$ {
       expires 1y;
       add_header Cache-Control "public, must-revalidate, proxy-revalidate";

       access_log off;
       log_not_found off;

       tcp_nodelay off;
       open_file_cache max=3000 inactive=120s;
       open_file_cache_valid 45s;
       open_file_cache_min_uses 2;
       open_file_cache_errors off;
    }

    location ~* ^.+\.svg$ {
       add_header Content-Security-Policy "script-src 'none'";
   }

    # Symfony front controller — forward everything to index.php
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # Block direct access to .php files other than index.php (Symfony best practice)
    location ~ ^/index\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass fastcgi_backend_xdebug_{{{php/xdebug/enabled}}};
        fastcgi_param  PHP_FLAG  "session.auto_start=off";
        fastcgi_param  PHP_VALUE "memory_limit=756M \n max_execution_time=18000";
        fastcgi_read_timeout 18000s;
        fastcgi_connect_timeout 18000s;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param SERVER_PORT "443";
        fastcgi_param HTTPS "on";
        include fastcgi_params;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
